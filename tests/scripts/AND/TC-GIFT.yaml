# 测试套件：GIFT 礼物（Android）
# 用例来源：doc/tests/cases/AND/TC-GIFT.md
appId: com.voiceroom.debug
---
# TC-GIFT-00001: 礼物面板 Bottom Sheet - 布局 + 交互
- launchApp
- tapOn: "大厅|Hall"
- tapOn:
    index: 0
- tapOn:
    id: "gift_button"
- assertVisible: "玫瑰|Rose"
- assertVisible: "火箭|Rocket"
- assertVisible:
    id: "balance_indicator"
- swipe:
    from:
      id: "gift_grid"
    direction: LEFT
- assertVisible: "第 2 页|page 2"

---
# TC-GIFT-00002: 接收者选择 - 默认主播麦 + 切换
- launchApp
- tapOn: "大厅|Hall"
- tapOn:
    index: 0
- tapOn:
    id: "gift_button"
- assertVisible:
    id: "receiver_avatar"
- tapOn:
    id: "receiver_avatar"
- assertVisible: "选择接收者|Select receiver"
- tapOn:
    text: "User_"
    index: 1
- assertVisible:
    id: "receiver_avatar"

---
# TC-GIFT-00003: SendGift - UUID msg_id + 连送 + 超时
- launchApp
- tapOn: "大厅|Hall"
- tapOn:
    index: 0
- tapOn:
    id: "gift_button"
- tapOn: "玫瑰|Rose"
- repeat:
    times: 5
    commands:
      - tapOn:
          id: "send_gift_button"
- assertVisible: "x5|×5"

---
# TC-GIFT-00004: 礼物特效 L1/L2/L3 + 补偿不回放
- launchApp
- tapOn: "大厅|Hall"
- tapOn:
    index: 0
- tapOn:
    id: "gift_button"
- tapOn: "火箭|Rocket"
- tapOn:
    id: "send_gift_button"
- assertVisible:
    id: "gift_effect_l3"
- stopApp
- launchApp
- assertNotVisible:
    id: "gift_effect_l3"

---
# TC-GIFT-00005: 余额不足按钮置灰 + BalanceUpdated 自动恢复
- launchApp
- tapOn: "大厅|Hall"
- tapOn:
    index: 0
- tapOn:
    id: "gift_button"
- tapOn: "火箭|Rocket"
- assertVisible:
    id: "send_gift_button_disabled"
# Admin 充值后自动恢复（外部触发）
- extendedWaitUntil:
    visible:
      id: "send_gift_button"
    timeout: 15000
