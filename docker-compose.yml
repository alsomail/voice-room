services:
  postgres:
    image: postgres:16-alpine
    container_name: vr-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: voiceroom
      APP_SERVER_PASS: ${APP_SERVER_PASS:-app_server_pass}
      ADMIN_SERVER_PASS: ${ADMIN_SERVER_PASS:-admin_server_pass}
    volumes:
      - vr-pgdata:/var/lib/postgresql/data
      - ./scripts/dev/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vr-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - vr-redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vr-pgdata:
  vr-redisdata:
